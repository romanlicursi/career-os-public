name: Layer 3 — Synthesis

on:
  schedule:
    - cron: '0 8 * * 2'   # Every Tuesday at 8am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Roman's LinkedIn profile + run synthesis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_KEY }}
        run: |
          mkdir -p data/logs
          python3 scripts/run_layer3_pipeline.py 2>&1 | tee data/logs/layer3-$(date +%Y-%m-%d).log

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summaries/synthesis_memo.md \
                  data/summaries/roman_profile_summary.json \
                  data/logs/
          git add "data/summaries/synthesis_memo_$(date +%Y-%m-%d).md" 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Layer 3 synthesis $(date +%Y-%m-%d)"
          git push

      - name: Read synthesis memo
        id: memo
        run: |
          {
            echo 'MEMO_CONTENT<<EOF'
            cat data/summaries/synthesis_memo.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Send synthesis memo by email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: romanlicursi@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Career OS — Weekly Synthesis Memo $(date +%Y-%m-%d)"
          to: romanlicursi@gmail.com
          from: Career OS <romanlicursi@gmail.com>
          body: ${{ steps.memo.outputs.MEMO_CONTENT }}
